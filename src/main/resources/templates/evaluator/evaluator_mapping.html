<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/default :: layout}">
<head>
    <meta charset="UTF-8">
    <title>평가자 관리</title>
    <link rel="stylesheet" th:href="@{/css/evaluator.css}">
</head>


<body>
<div th:fragment="content" class="dashboard-container">
    <div class="layout">
        <div class="container">
        <h2 class="page-title">평가자 매핑 관리</h2>
            <!-- 필터 영역 -->
            <div class="filter-box">
			
			   <form id="deptForm" method="get" action="/evaluator">
				    
				    <div class="filter-row between">
				        <div class="left-group">
				            <label>부서 선택:</label>
				
				            <select name="deptId">
				                <option th:each="dept : ${deptList}"
				                        th:value="${dept.id}"
				                        th:text="${dept.name}"
				                        th:selected="${dept.id == selectedDept}">
				                </option>
				            </select>
				
				            <button type="button" class="btn-secondary"
				                    onclick="submitDeptForm('/evaluator')">
				                조회
				            </button>
				
				            <button type="button" class="btn-primary"
				                    onclick="submitDeptForm('/evaluator/create')">
				                자동 생성
				            </button>
				        </div>
				    </div>
				
				</form>
			    
			    <form id="createForm" method="post" action="/evaluator/create">
			        <input type="hidden" name="deptId" id="createDeptId">
			    </form>
			    
	    		<div th:if="${errorMessage != null and errorMessage != ''}" class="alert-box">
				    <span th:text="${errorMessage}"></span>
				</div>
							
			</div>

            <!-- 👇 사원 검색 + 리스트 영역 (분리된 카드) -->
            <div class="employee-section">
			
			    <div class="search-row between">
			
			        <div class="search-box">
			            <label>사원 검색:</label>
			            <input type="text" placeholder="이름 / 사원번호 입력">
			            <button class="btn-secondary">조회</button>
			        </div>
			
			        <button class="btn-danger">평가자 초기화</button>
			
			    </div>
			
			</div>

            <!-- 평가자 테이블 0차 평가는 본인 -->
			<table th:if="${evalList != null and !evalList.isEmpty()}">
			    <thead>
			    <tr>
			        <th>부서</th>
			        <th>사원명(피평가자)</th>
			        <th>직급</th>
			        <th>1차 평가자</th>
			        <th>최종 평가자</th>
			        <th>생성 방식</th>
			        <th>관리</th>
			    </tr>
			    </thead>
			
			    <tbody>
			    <tr th:each="eval : ${evalList}">
			        <td th:text="${eval.deptName}"></td>
			        <td th:text="${eval.empName}"></td>
			        <td th:text="${eval.position}"></td>
			        <td th:text="${eval.firstEvaluators}"></td>
			        <td th:text="${eval.finalEvaluator}"></td>
			        <td>
			            <span th:class="${eval.updateBy != null} ? 'tag tag-warning' : 'tag tag-success'"
			                  th:text="${eval.updateBy != null} ? '수동' : '자동'">
			            </span>
			        </td>
			        <td>
			            <button class="edit-btn">수정</button>
			        </td>
			    </tr>
			    </tbody>
			</table>
			
			<!-- 👇 데이터 없을 때 -->
			<div th:if="${evalList == null or evalList.isEmpty()}" class="empty-box">
			    <p>해당 부서의 평가자 매핑이 없습니다.</p>
			    <p>다른 부서를 조회하거나 평가자 매핑을 생성해주세요.</p>
			</div>

        </div>
    </div>
</div>
</body>
</html>
