<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/default :: layout}">
<head>
    <meta charset="UTF-8">
    <title>평가자 관리</title>
    <link rel="stylesheet" th:href="@{/css/evaluator.css}">
</head>


<body>
<div th:fragment="content" class="dashboard-container">
    <div class="layout">
        <div class="container">
        <h2 class="page-title">평가자 매핑 관리</h2>
            <!-- 필터 영역 -->
            <div class="filter-box">
			
			   <form id="deptForm" method="get" action="/evaluator">

			    <div class="filter-row left-group">
			        <label>부서 선택:</label>
			
			        <select name="deptId">
			            <option th:each="dept : ${deptList}"
			                    th:value="${dept.id}"
			                    th:text="${dept.name}"
			                    th:selected="${dept.id == selectedDept}">
			            </option>
			        </select>
			
			        <select name="typeId">
			            <option th:each="type : ${evalTypeList}"
			                    th:value="${type.id}"
			                    th:selected="${type.id == selectedTypeId}"
			                    th:text="${type.name + ' (' +
			                              #temporals.format(type.startDate, 'yyyy-MM-dd') +
			                              ' ~ ' +
			                              #temporals.format(type.endDate, 'yyyy-MM-dd') + ')'}">
			            </option>
			        </select>
			
			        <button type="button"
			                class="btn-secondary"
			                onclick="submitDeptForm('/evaluator')">
			            조회
			        </button>
			
			        <button type="button"
			                class="btn-primary"
			                onclick="submitDeptForm('/evaluator/create')">
			            자동 생성
			        </button>
			    </div>
			
			    <div class="filter-row search-row">
			        <div class="search-box">
					    <label>사원 검색:</label>
					    <input type="text" name="employeeSearch" placeholder="이름 / 사원번호 입력"  th:value="${employeeSearch}">
					</div>
			
			        <button type="button"
			                class="btn-danger"
			                onclick="submitResetForm()">
			            평가자 일괄 초기화
			        </button>
			    </div>
			
			</form>
			    
			    <form id="createForm" method="post" action="/evaluator/create">
			        <input type="hidden" name="deptId" id="createDeptId">
			        <input type="hidden" id="createTypeId" name="typeId">
			    </form>
			    
	    		<div th:if="${errorMessage != null and errorMessage != ''}" class="alert-box">
				    <span th:text="${errorMessage}"></span>
				</div>
							
			</div>

			<form id="resetForm" method="post" action="/evaluator/reset" >
			    <input type="hidden" name="deptId" id="resetDeptId">
    			<input type="hidden" name="typeId" id="resetTypeId">
			</form>

            <!-- 평가자 테이블 0차 평가는 본인 -->
			<table th:if="${evalList != null and !evalList.isEmpty()}">
			    <thead>
			    <tr>
			        <th>부서</th>
			        <th>사원명(피평가자)</th>
			        <th>직급</th>
			        <th>1차 평가자</th>
			        <th>최종 평가자</th>
			        <th>상태</th>
			        <th>관리</th>
			    </tr>
			    </thead>
			
			    <tbody>
			    <tr th:each="eval : ${evalList}">
			        <td th:text="${eval.deptName}"></td>
			        <td th:text="${eval.empName}"></td>
			        <td th:text="${eval.position}"></td>
			        <td th:text="${#strings.isEmpty(eval.firstEvaluatorNames) ? '-' : eval.firstEvaluatorNames}"></td>
			        <td th:text="${#strings.isEmpty(eval.finalEvaluatorName) ? '-' : eval.finalEvaluatorName}"></td>
			        <td>
			            <span th:class="${eval.systemType == 'MANUAL'} ? 'tag tag-warning' : 'tag tag-success'"
			                  th:text="${eval.systemType == 'MANUAL'} ? '수정' : '자동'">
			            </span>
			        </td>
			        <td>
			            <button class="edit-btn"
						        th:data-emp-no="${eval.empNo}">
						    수정
						</button>
			        </td>
			    </tr>
			    </tbody>
			</table>
			
			<!-- 👇 데이터 없을 때 -->
			<div th:if="${evalList == null or evalList.isEmpty()}" class="empty-box">
			    <p>해당 부서의 평가자 매핑이 없습니다.</p>
			    <p>다른 부서를 조회하거나 평가자 매핑을 생성해주세요.</p>
			</div>

        </div>
		<div id="editModal" class="modal-drawer" style="display:none;">
		    <div class="drawer-content">
		
		        <form method="post" action="/evaluator/update">
		
		            <div class="drawer-header">
		                <h2>평가자 수정</h2>
		                <button type="button" class="close-btn" onclick="closeModal()">✕</button>
		            </div>
		
		            <!-- 피평가자 정보 -->
		            <div class="section">
		                <h3>피평가자 정보</h3>
		
		                <div class="grid">
		                    <div class="field">
		                        <label>부서</label>
		                        <input type="text" id="deptName" readonly>
		                        <input type="hidden" name="deptId" id="deptId">
		                    </div>
		
		                    <div class="field">
		                        <label>사원번호</label>
		                        <input type="text" id="empNo" name="empNo" readonly>
		                    </div>
		
		                    <div class="field">
		                        <label>이름</label>
		                        <input type="text" id="empName" readonly>
		                    </div>
		
		                    <div class="field">
		                        <label>직급</label>
		                        <input type="text" id="position" readonly>
		                    </div>
		                </div>
		            </div>
		
		            <!-- 평가자 -->
		            <div class="section">
		                <h3>평가자 정보</h3>
						
						<div style="display: flex; flex-direction: column; gap: 8px;">
		                <div class="field">
						    <label>1차 평가자</label>
						
						    <div class="evaluator-toolbar">
						        <select id="availableEvaluatorSelect">
						            <option value="">평가자 선택</option>
						        </select>
						
						        <button type="button"
						                class="add-evaluator-btn"
						                onclick="addEvaluator()">
						            + 평가자 추가
						        </button>
						    </div>
						
						    <div id="firstEvaluatorsBox" class="tag-box"></div>
						
						    <input type="hidden"
						           name="firstEvaluators"
						           id="firstEvaluatorsInput">
						</div>
		
		                <div class="field">
						    <label>2차 평가자</label>
						
						    <div class="evaluator-toolbar">
						        <select id="finalEvaluatorSelect" name="finalEvaluator">
									<option value="">최종 평가자를 선택하세요</option>
						            <option th:each="executive : ${executiveList}"
						                    th:value="${executive.empNo}"
						                    th:text="${executive.name}">
						            </option>
						
						        </select>
						    </div>
						</div>
						</div>
						<input type="hidden" name="typeId" id="modalTypeId">
<!-- 		                <div class="field checkbox">
		                    <label>
		                        <input type="checkbox" name="excluded">
		                        평가 대상 제외
		                    </label>
		                </div> -->
		            </div>
					
					<div style="display: flex; justify-content: space-between; align-items: center;">
					    <button type="button"
						        class="btn-danger"
						        onclick="deleteTarget()">
						    평가자 대상 삭제
						</button>
					
					    <div class="button-area">
					        <button type="submit" class="btn-primary">저장</button>
					        <button type="button" class="btn" onclick="closeModal()">닫기</button>
					    </div>
					</div>
		
		        </form>

		    </div>

		</div>
    </div>
</div>

</body>
</html>
