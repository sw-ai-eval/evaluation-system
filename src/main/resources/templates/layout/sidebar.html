<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="sidebar(title, content)">
    <aside style="width: 350px; background: #fff; border-right: 1px solid #dadada; display: flex; flex-direction: column;">
        <div style="padding: 20px; border-bottom: 1px solid #eee; background: #f8f9fa; display: flex; justify-content: space-between; align-items: center;">
            <strong th:text="${title}" style="font-size: 17px;">목록</strong>
            <button class="btn btn-primary" style="padding: 2px 10px; font-size: 12px;">등록</button>
        </div>
        <div style="flex: 1; overflow-y: auto; padding: 10px;">
            <th:block th:replace="${content}"></th:block>
        </div>
    </aside>
</div>
</html>
