<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout">

<head>
    <meta charset="UTF-8">
    <title>평가 시스템</title>
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <!-- 부서 페이지일 때 부서 CSS -->
    <link rel="stylesheet" th:href="@{/css/department.css}" th:if="${pageType == 'dept/department'}">
    <!-- 사원 페이지일 때 사원 CSS -->
    <link rel="stylesheet" th:href="@{/css/employee.css}" th:if="${pageType == 'emp/employee'}">

    <link rel="stylesheet" th:href="@{/css/evaluator.css}" th:if="${pageType == 'evaluator/evaluator_mapping'}">
    
</head>

<body class="layout-body" th:attr="data-error-message=${errorMessage}">


    <div th:replace="~{layout/sidebar :: sidebar}"></div>


    <div class="layout-content">
        <div th:replace="~{::content}"></div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            const menuItems = document.querySelectorAll('.menu-item');

            menuItems.forEach(item => {
                if (item.getAttribute('href') === currentPath) {
                    item.classList.add('active');
                }
            });
        });
    </script>


        <!-- 부서 페이지일 때만 부서 JS 로드 -->
    <script th:src="@{/js/department.js}" th:if="${pageType == 'dept/department'}"></script>
    <!-- 사원 페이지일 때만 사원 JS 로드 -->
    <script th:src="@{/js/employee.js}" th:if="${pageType == 'emp/employee'}"></script>
    <!-- 평가자 관리 페이지일 때만 사원 JS 로드 -->
    <script th:src="@{/js/evaluator.js}" th:if="${pageType == 'evaluator/evaluator_mapping'}"></script>
    

</body>
</html>
