<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/default :: layout}">
<head>
    <meta charset="UTF-8">
    <title>사원 관리</title>
    <link rel="stylesheet" th:href="@{/css/employee.css}">
</head>
<body>
<div th:fragment="content" class="dashboard-container">
	<div class="layout">
        <!-- 🔷 상단 검색 영역 -->
        <div class="toolbar">
	        <form th:action="@{/employee}" method="get" class="search-form">
	            <input type="text" name="keyword" placeholder="사번 또는 성명 검색"
	               th:value="${keyword}" />
	            <select name="deptId">
	                <option value="">전체 부서</option>
	                <option th:each="dept : ${deptList}"
	                        th:value="${dept.id}"
	                        th:text="${dept.name}"
	                        th:selected="${deptId == dept.id}"></option>
	            </select>
	            <select name="status">
	                <option value="">전체 상태</option>
	                <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">재직</option>
	                <option value="LEAVE" th:selected="${status == 'LEAVE'}">휴직</option>
	                <option value="RESIGNED" th:selected="${status == 'RESIGNED'}">퇴사</option>
	            </select>
	            <div class="search-actions">
	                <button type="submit" class="primary">검색</button>
	            </div>
	        </form>

	        <!-- 사원 등록 버튼 -->
	        <button class="primary" id="open-register-form-btn">+ 사원 등록</button>
        </div>

        <div class="list-section">
            <table class="employee-table">
                <thead>
                    <tr>
                        <th>사원번호</th>
                        <th>성명</th>
                        <th>부서</th>
                        <th>직급</th>
                        <th>이메일</th>
                        <th>연락처</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="emp : ${employeeList}">
                        <td th:text="${emp.empNo}"></td>
                        <td th:text="${emp.name}"></td>
                        <td>
						    <span th:text="${emp.deptName}"></span>
						    (<span th:text="${emp.deptId}"></span>)
						</td>
                        <td th:text="${emp.positionLevel}"></td>
                        <td th:text="${emp.email}"></td>
                        <td th:text="${emp.phone}"></td>
                        <td>
                            <span
							    th:classappend="${
							        emp.status == 'ACTIVE' ? 'badge active' :
							        emp.status == 'LEAVE' ? 'badge leave' :
							        emp.status == 'RESIGNED' ? 'badge resigned' :
							        ''
							    }"
							    th:text="${
							        emp.status == 'ACTIVE' ? '재직' :
							        emp.status == 'LEAVE' ? '휴직' :
							        emp.status == 'RESIGNED' ? '퇴사' :
							        '알수없음'
							    }">
							</span>
                        </td>
                        <td>
				            <!-- 수정 버튼 -->
				            <button class="btn-edit" th:data-emp-no="${emp.empNo}"
				                    th:data-emp-name="${emp.name}"
				                    th:data-emp-dept="${emp.deptId}"
				                    th:data-emp-position="${emp.positionLevel}"
				                    th:data-emp-email="${emp.email}"
				                    th:data-emp-phone="${emp.phone}"
				                    th:data-emp-status="${emp.status}">
				                수정
				            </button>
				            
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

	</div>

    <!-- 🔷 등록 폼 생성 -->
    <div class="detail-section" id="employee-register-form">
        <div class="card">
            <h3>사원 등록</h3>
            <form th:action="@{/employee/create}" method="post" th:object="${employee}">
                <!-- 폼 내용 동일 -->
                <div class="form-grid">
                    <div class="row-group"> 
                    	<div> 
                    		<label>성명</label> 
                    		<input type="text" th:field="*{name}" required /> 
                    	</div> 
                    	<div> 
                    		<label>이메일</label> 
                    		<input type="email" th:field="*{email}" /> 
                    	</div> 
                    </div> 
                    <div class="row-group"> 
                    	<div> 
                    		<label>핸드폰</label> 
                    		<input type="text" th:field="*{phone}" required /> 
                    	</div> 
                    	<div> 
                    		<label>부서</label> 
                    		<select th:field="*{deptId}" required> 
	                    		<option th:each="dept : ${deptList}" th:value="${dept.id}" th:text="${dept.name}"> 
	                    		</option> 
                    		</select> 
                    	</div> 
                    </div> 
                    <div class="row-group"> 
                    	<div> 
                    		<label>직급</label> 
                    		<input type="text" th:field="*{positionLevel}" /> 
                    	</div> 
                    	<div> 
                    		<label>직종</label> 
                    		<input type="text" th:field="*{job}" /> 
                    	</div> 
                    </div> 
                    <div class="row-group"> 
                    	<div> 
                    		<label>입사일</label> 
                    		<input type="date" th:field="*{hireDate}" required /> 
                    	</div>
                    	<div> 
		                    <label>재직 상태</label> 
		                    <select th:field="*{status}"> 
			                    <option value="ACTIVE">재직</option> 
			                    <option value="LEAVE">휴직</option> 
			                    <option value="RESIGNED">퇴사</option> 
		                    </select> 
	                    </div>   
                    </div> 
                   <div class="row-group">
					
					    <!-- 🔷 부서장 여부 -->
					    <div class="checkbox-row">
					        <label>부서장 여부</label>
					
					        <!-- 해제 상태 기본값 -->
					        <input type="hidden" name="position" value="부서원"/>
					
					        <label class="toggle">
					            <input type="checkbox"
					                   name="position"
					                   value="1"
					                   th:checked="${employee.position == '부서장'}"/>
					            <span class="slider"></span>
					            <span class="toggle-text">부서장 지정</span>
					        </label>
					    </div>
					
					    <!-- 🔷 관리자 권한 -->
					    <div class="checkbox-row">
					        <label>관리자 권한 부여</label>
					
					        <!-- 기본값 -->
					        <input type="hidden" name="role" value="user"/>
					
					        <label class="toggle">
					            <input type="checkbox"
					                   name="role"
					                   value="admin"
					                   th:checked="${employee.role == 'admin'}"/>
					            <span class="slider"></span>
					            <span class="toggle-text">관리자</span>
					        </label>
					    </div>
					
					</div>
                    <div class="actions">
                        <button type="submit" class="primary">저장</button>
                        <button type="button" class="secondary" onclick="closeRegisterForm()">닫기</button>
                    </div> 
                </div>
            </form>
        </div>
    </div>
    
    <!-- 🔷 수정 폼 생성 -->
    <div class="detail-section" id="employee-update-form">
        <div class="card">
            <h3>사원 수정</h3>
            <form th:action="@{/employee/save}" method="post" th:object="${employee}">
                <!-- 폼 내용 동일 -->
                <div class="form-grid">
                	<div style="display: flex; flex-direction: column; gap: 6px;">
					    <label>사원 번호 (수정 불가)</label>
					    <input type="text" th:field="*{empNo}" readonly="readonly"  />
					</div>
                	<div class="row-group">
                	
                    	<div> 
                    		<label>성명</label> 
                    		<input type="text" th:field="*{name}" required /> 
                    	</div> 
                    	<div> 
                    		<label>이메일</label> 
                    		<input type="email" th:field="*{email}" /> 
                    	</div> 
                    </div> 
                    <div class="row-group"> 
                    	<div> 
                    		<label>핸드폰</label> 
                    		<input type="text" th:field="*{phone}" required /> 
                    	</div> 
                    	<div> 
                    		<label>부서</label> 
                    		<select th:field="*{deptId}" required> 
	                    		<option th:each="dept : ${deptList}" th:value="${dept.id}" th:text="${dept.name}"> 
	                    		</option> 
                    		</select> 
                    	</div> 
                    </div> 
                    <div class="row-group"> 
                    	<div> 
                    		<label>직급</label> 
                    		<input type="text" th:field="*{positionLevel}" /> 
                    	</div> 
                    	<div> 
                    		<label>직종</label> 
                    		<input type="text" th:field="*{job}" /> 
                    	</div> 
                    </div> 
                    <div class="row-group"> 
                    	<div> 
                    		<label>입사일</label> 
                    		<input type="date" th:field="*{hireDate}" required /> 
                    	</div>
                    	<div> 
                    		<label>퇴사일</label> 
                    		<input type="date" th:field="*{resignDate}"/> 
                    	</div>
                    	 
                    </div> 
                    <div class="row-group">
                    	<div> 
		                    <label>재직 상태</label> 
		                    <select th:field="*{status}"> 
			                    
							    <option value="ACTIVE">재직</option>
							    <option value="LEAVE">휴직</option>
							    <option value="RESIGNED">퇴사</option>
							</select>		                    
	                    </div>  
                    	<div>
                    		<label>계정 잠금 상태</label>
                    		<span th:classappend="${
							        employee.locked == 0 ? 'badge active' : 'badge resigned'
							    }"
							    th:text="${employee.locked == 0 ? '활성화' : '잠금'}">
							</span>
                    	</div>
                    
                    </div>
                    <div class="row-group">
					
					    <div class="checkbox-row">
						    <label>부서장 여부</label>
						
						    <input type="hidden" name="position" value="부서원"/>
						
						    <label class="toggle">
						        <input type="checkbox"
						               name="position"
						               value="1"
						               th:checked="${employee.position == true or employee.position == '부서장'}"/>
						        <span class="slider"></span>
						        <span class="toggle-text">부서장 지정</span>
						    </label>
						</div>
					
					    <!-- 🔷 관리자 권한 -->
											    <!-- 🔷 관리자 권한 -->
						<div class="checkbox-row">
						    <label>관리자 권한 부여</label>
						
						    <!-- 기본값 -->
						    <input type="hidden" name="role" value="user"/>
						
						    <label class="toggle">
						        <input type="checkbox"
						               name="role"
						               value="admin"
						               th:checked="${employee.role == 'admin'}"/>
						        <span class="slider"></span>
						        <span class="toggle-text">관리자</span>
						    </label>
						</div>
					
					</div>
					                    
                    <div class="actions">
                        <button type="submit" class="primary">저장</button>
                        <button type="button" class="danger">삭제</button>
                        <button type="button" class="secondary" onclick="closeEditForm()">닫기</button>
                    </div> 
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
