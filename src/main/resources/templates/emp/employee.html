<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/default :: layout}">
<head>
    <meta charset="UTF-8">
    <title>사원 관리</title>
    <link rel="stylesheet" th:href="@{/css/employee.css}">
</head>
<body>
<div th:fragment="content" class="dashboard-container">
	<div class="layout">
        <!-- 🔷 상단 검색 영역 -->
        <div class="toolbar">
	        <form th:action="@{/employee}" method="get" class="search-form">
	            <input type="text" name="keyword" placeholder="사번 또는 성명 검색"
	               th:value="${keyword}" />
	            <select name="deptId">
	                <option value="">전체 부서</option>
	                <option th:each="dept : ${deptList}"
	                        th:value="${dept.id}"
	                        th:text="${dept.name}"
	                        th:selected="${deptId == dept.id}"></option>
	            </select>
	            <select name="status">
	                <option value="">전체 상태</option>
	                <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">재직</option>
	                <option value="LEAVE" th:selected="${status == 'LEAVE'}">휴직</option>
	                <option value="RESIGNED" th:selected="${status == 'RESIGNED'}">퇴사</option>
	            </select>
	            <div class="search-actions">
	                <button type="submit" class="primary">검색</button>
	            </div>
	        </form>

	        <!-- 사원 등록 버튼 -->
	        <button class="register-btn" id="open-register-form-btn">+ 사원 등록</button>
        </div>

        <div class="list-section">
            <table class="employee-table">
                <thead>
                    <tr>
                        <th>사원번호</th>
                        <th>성명</th>
                        <th>부서</th>
                        <th>직급</th>
                        <th>이메일</th>
                        <th>연락처</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="emp : ${employeeList}"  th:classappend="${emp.overdueResignFlag == 1} ? 'warning-row'">
                        <td th:text="${emp.empNo}"></td>
                        <td th:text="${emp.name}"></td>
                        <td>
						    <span th:text="${emp.deptName}"></span>
						    (<span th:text="${emp.deptId}"></span>)
						</td>
                        <td th:text="${emp.levelName}"></td>
                        <td th:text="${emp.email}"></td>
                        <td th:text="${emp.phone}"></td>
                        <td>
                            <span
							    th:classappend="${
							        emp.status == 'ACTIVE' ? 'badge active' :
							        emp.status == 'LEAVE' ? 'badge leave' :
							        emp.status == 'RESIGNED' ? 'badge resigned' :
							        ''
							    }"
							    th:text="${
							        emp.status == 'ACTIVE' ? '재직' :
							        emp.status == 'LEAVE' ? '휴직' :
							        emp.status == 'RESIGNED' ? '퇴사' :
							        '알수없음'
							    }">
							</span>
                        </td>
                        <td>
				            <!-- 수정 버튼 -->
				            <button class="btn-edit" 
				            		th:data-emp-no="${emp.empNo}"
				                    th:data-emp-name="${emp.name}"
				                    th:data-emp-dept="${emp.deptId}"
				                    th:data-emp-levelName="${emp.levelName}"
				                    th:data-emp-email="${emp.email}"
				                    th:data-emp-phone="${emp.phone}"
				                    th:data-emp-status="${emp.status}">
				                수정
				            </button>
				            <span th:if="${emp.overdueResignFlag == 1}" class="badge danger">
						    ⚠ 퇴직 처리 지연
							</span>
                        </td>
                    </tr>
                </tbody>
                
            </table>
            <!-- 데이터 없을 때 -->
				    <div class="empty-state" th:if="${employeeList != null and #lists.isEmpty(employeeList)}">
					    
					    <div class="empty-icon">🔍</div>
					
					    <div class="empty-title">
					        관련된 사원이 없습니다.
					    </div>
					
					    <div class="empty-desc">
					        조건을 변경하거나 다른 사원을 검색해보세요.
					    </div>
					
					</div>
            <div class="pagination">
			
			    <!-- 이전 버튼 -->
			    <a th:if="${!employeePage.first}"
			       th:href="@{/employee(page=${employeePage.number - 1}, 
			                           keyword=${keyword}, 
			                           deptId=${deptId}, 
			                           status=${status})}">
			        이전
			    </a>
			
			    <!-- 페이지 번호 -->
			    <span th:each="i : ${#numbers.sequence(0, employeePage.totalPages - 1)}">
			        <a th:href="@{/employee(page=${i}, 
			                               keyword=${keyword}, 
			                               deptId=${deptId}, 
			                               status=${status})}"
			           th:text="${i + 1}"
			           th:classappend="${i == employeePage.number} ? 'active'">
			        </a>
			    </span>
			
			    <!-- 다음 버튼 -->
			    <a th:if="${!employeePage.last}"
			       th:href="@{/employee(page=${employeePage.number + 1}, 
			                           keyword=${keyword}, 
			                           deptId=${deptId}, 
			                           status=${status})}">
			        다음
			    </a>
			
			</div>
        </div>

	</div>

    <!-- 🔷 등록 폼 생성 -->
    <div class="detail-section" id="employee-register-form">
        <div class="card">
            <h3>사원 등록</h3>
            <form th:action="@{/employee/create}" method="post" th:object="${employee}">
                <!-- 폼 내용 동일 -->
                <div class="form-grid">
                    <div class="row-group"> 
                    	<div> 
                    		<label>성명</label> 
                    		<input type="text" th:field="*{name}" required /> 
                    	</div> 
                    	<div> 
                    		<label>이메일</label> 
                    		<input type="email" th:field="*{email}" required /> 
                    	</div> 
                    </div> 
                    <div class="row-group"> 
                    	<div> 
                    		<label>핸드폰</label> 
                    		<input type="text" th:field="*{phone}" required /> 
                    	</div> 
                    	<div> 
                    		<label>부서</label> 
                    		<select th:field="*{deptId}" required> 
	                    		<option th:each="dept : ${deptList}" th:if="${!dept.deleteYn}" th:value="${dept.id}" th:text="${dept.name}"> 
	                    		</option> 
                    		</select> 
                    	</div> 
                    </div> 
                    <div class="row-group"> 
                    	<div>
						    <label>직급</label>
						    <select th:field="*{levelId}" required>
						        <option value="">선택</option>
						
						        <option th:each="code : ${level}"
						                th:value="${code.id}"
						                th:text="${code.name}">
						        </option>
						    </select>
						</div>
                    	<div>
						    <label>직종</label>
						    <select th:field="*{jobId}" required>
						        <option value="">선택</option>
						
						        <option th:each="code : ${jobCode}"
						                th:value="${code.id}"
						                th:text="${code.name}">
						        </option>
						    </select>
						</div> 
                    </div> 
                    <div class="row-group"> 
                    	<div> 
                    		<label>입사일</label> 
                    		<input type="date" th:field="*{hireDate}" required /> 
                    	</div>
                    	<div> 
		                    <label>재직 상태</label> 
		                    <select th:field="*{status}"> 
			                    <option value="ACTIVE">재직</option> 
			                    <option value="LEAVE">휴직</option> 
			                    <option value="RESIGNED">퇴사</option> 
		                    </select> 
	                    </div>   
                    </div> 
                   <div class="row-group">

					    <div>
					        <label class="field-label">권한</label>
					
					        <select th:field="*{role}">
					            <option value="USER">일반 사용자</option>
					            <option value="ADMIN">관리자</option>
					        </select>
					    </div>
					
					</div>
                    <div class="actions">
                        <button type="submit" class="primary">저장</button>
                        <button type="button" class="secondary" onclick="closeRegisterForm()">닫기</button>
                    </div> 
                </div>
            </form>
        </div>
    </div>
    
    <!-- 🔷 수정 폼 생성 -->
    <div class="detail-section" id="employee-update-form">
        <div class="card">
            <h3>사원 수정</h3>
            <form th:action="@{/employee/update}" method="post" th:object="${employee}">
                <!-- 폼 내용 동일 -->
                <div class="form-grid">
                	<div class="row-group">
                		<div>
              				<label>사원 번호 (수정 불가)</label>
					    	<input type="text" th:field="*{empNo}" readonly="readonly"  />
                		</div>
					    
					    <div>

						    <label>부서장 여부</label>
										
							<span id="positionBadge"
							      th:classappend="${employee.position == '부서장' ? 'badge manager' : 'badge staff'}"
							      th:text="${employee.position}">
							</span>
                    	
						</div>
						
					</div>
                	<div class="row-group">
                	
                    	<div> 
                    		<label>성명</label> 
                    		<input type="text" th:field="*{name}" required /> 
                    	</div> 
                    	<div> 
                    		<label>이메일</label> 
                    		<input type="email" th:field="*{email}" required /> 
                    	</div> 
                    </div> 
                    <div class="row-group"> 
                    	<div> 
                    		<label>핸드폰</label> 
                    		<input type="text" th:field="*{phone}" required /> 
                    	</div> 
                    	<div> 
                    		<label>부서</label> 
                    		<select th:field="*{deptId}" required> 
	                    		<option th:each="dept : ${deptList}" th:if="${!dept.deleteYn}" th:value="${dept.id}" th:text="${dept.name}"> 
	                    		</option> 
                    		</select> 
                    	</div> 
                    </div> 
                    <div class="row-group"> 
                    	<div>
						    <label>직급</label>
						    <select th:field="*{levelId}" required>
						        <option value="">선택</option>
						
						        <option th:each="code : ${level}"
						                th:value="${code.id}"
						                th:text="${code.name}">
						        </option>
						    </select>
						</div>
                    	<div>
						    <label>직종</label>
						    <select th:field="*{jobId}" required>
						        <option value="">선택</option>
						
						        <option th:each="code : ${jobCode}"
						                th:value="${code.id}"
						                th:text="${code.name}">
						        </option>
						    </select>
						</div> 
                    </div> 
                    <div class="row-group"> 
                    	<div> 
                    		<label>입사일</label> 
                    		<input type="date" th:field="*{hireDate}" required /> 
                    	</div>
                    	<div> 
                    		<label>퇴사일</label> 
                    		<input type="date" th:field="*{resignDate}"/> 
                    	</div>
                    	 
                    </div> 
                    <div class="row-group">
                    	<div> 
		                    <label>재직 상태</label> 
		                    <select th:field="*{status}"> 
			                    
							    <option value="ACTIVE">재직</option>
							    <option value="LEAVE">휴직</option>
							    <option value="RESIGNED">퇴사</option>
							</select>		                    
	                    </div>  
                    	<div>
                    		<label>계정 잠금 상태</label>
                    		<span id="lockedBadge" class="badge"></span>
                    	</div>
                    
                    </div>
                    <div class="row-group">
					
					    <div>
					        <label class="field-label">권한</label>
					
					        <select th:field="*{role}">
					            <option value="USER">일반 사용자</option>
					            <option value="ADMIN">관리자</option>
					        </select>
					    </div>
					
					</div>
					<div id="errorBox" class="error-box" style="display:none;"></div>          
                    <div class="actions">
                        <button type="submit" class="primary">저장</button>
                        <!-- <button type="button" class="danger">삭제</button> -->
                        <button type="button" class="secondary" onclick="closeEditForm()">닫기</button>
                    </div> 
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
