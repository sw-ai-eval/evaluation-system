<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/default :: layout}">
<head>
    <meta charset="UTF-8">
    <title>면담 관리</title>
    <link rel="stylesheet" th:href="@{/css/interview.css}">
</head>

<body>
<div th:fragment="content">

    <div class="interview-container">

        <!-- 헤더 -->
        <div class="page-header">
            <h1>면담 관리</h1>
            <p>
                면담 내용을 기록하여 사원의 성장 및 향후 평가 참고자료로 활용합니다.
            </p>
        </div>

        <!-- ========================= -->
        <!-- 면담 기록 목록 -->
        <!-- ========================= -->

        <div class="table-header">

            <div class="card-title">
                면담 기록 목록
            </div>

            <button class="open-panel-btn"
                    th:if="${userPosition == '부서장'}"
                    onclick="openCreatePanel()">
                + 면담 등록
            </button>

        </div>

        <div class="card">

            <table class="interview-table">

                <thead>
                <tr>
                    <th>면담일시</th>
                    <th>면담구분</th>
                    <th>면담자 사번</th>
                    <th>면담자</th>
                    <th>대상자 사번</th>
                    <th>대상자</th>
                    <th>장소</th>
                    <th>상태</th>
                    <th th:if="${userPosition == '부서장'}">관리</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="interview : ${interviewList}">

                    <td th:text="${interview.interviewDate}">
                        2026-05-17
                    </td>

                    <td th:text="${interview.interviewType}">
                        정기 면담
                    </td>

                    <td th:text="${interview.evaluatorNo}">
                        면담자 사번
                    </td>

                    <td th:text="${interview.evaluatorName}">
                        면담자
                    </td>

                    <td th:text="${interview.evaluateeNo}">
                        대상자 사번
                    </td>

                    <td th:text="${interview.evaluateeName}">
                        홍길동
                    </td>

                    <td th:text="${interview.location}">
                        회의실 A
                    </td>

                    <td>
                        <span class="status completed">
                            면담 완료
                        </span>
                    </td>

                    <td th:if="${userPosition == '부서장'}">
                        <button class="edit-btn"
                                onclick="openEditPanel(this)"
                                th:data-date="${interview.interviewDate}"
                                th:data-type="${interview.interviewType}"
                                th:data-emp="${interview.empNo}"
                                th:data-name="${interview.employeeName}"
                                th:data-location="${interview.location}">
                            수정
                        </button>
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

        <!-- ========================= -->
        <!-- 면담 기본 정보 -->
        <!-- ========================= -->

        <!-- ========================= -->
        <!-- 면담 등록 패널 -->
        <!-- ========================= -->

        <!-- 패널 -->
        <div class="interview-panel"
             id="interviewPanel">

            <div class="panel-header">

                <h2 id="panelTitle">면담 등록</h2>

                <button class="close-btn"
                        onclick="closeInterviewPanel()">
                    ✕
                </button>

            </div>

            <div class="panel-body">

                <!-- 기본 정보 -->
                <div class="form-group">
                    <label>면담 대상자</label>

                    <select class="form-control"
                            id="panelEmployee">

                        <option value="">선택하세요</option>

                        <option
                                th:each="employee : ${employeeList}"
                                th:value="${employee.empNo}"
                                th:text="${employee.empName}">
                        </option>

                    </select>
                </div>

                <div class="form-group">
                    <label>면담 구분</label>

                    <select class="form-control"
                            id="panelType">

                        <option>정기 면담</option>
                        <option>수시 면담</option>

                    </select>
                </div>

                <div class="form-group">
                    <label>면담 일시</label>

                    <input type="datetime-local"
                           class="form-control"
                           id="panelDate">
                </div>

                <div class="form-group">
                    <label>장소</label>

                    <input type="text"
                           class="form-control"
                           id="panelLocation"
                           placeholder="면담 장소 입력">
                </div>

                <!-- 주제 -->
                <div class="panel-topic-area">

                    <div class="panel-topic-title">
                        면담 주제
                    </div>

                    <div class="topic-item"
                         th:each="topic : ${topicList}">

                        <div class="topic-header">

                    <span th:text="${topic.topicName}">
                        업무 애로사항
                    </span>

                        </div>

                        <textarea
                                class="topic-textarea"
                                rows="4"
                                placeholder="면담 내용을 입력하세요.">
                </textarea>

                    </div>

                </div>

                <!-- 저장 -->
                <div class="panel-button-area">

                    <button class="save-btn">
                        저장
                    </button>

                </div>

            </div>

        </div>
    </div>

</div>
</body>
</html>
