<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/default :: layout}">
<head>
    <meta charset="UTF-8">
    <title>면담 관리</title>
    <link rel="stylesheet" th:href="@{/css/interview.css}">
</head>

<body>
<div th:fragment="content">

    <div class="interview-container">

        <!-- 헤더 -->
        <div class="page-header">
		    <div class="header-text">
		        <h1>면담 관리</h1>
		        <p>
		            면담 내용을 기록하여 사원의 성장 및 향후 평가 참고자료로 활용합니다.
		        </p>
		    </div>
		    
		    <button class="open-panel-btn"
		            th:if="${userPosition == '부서장'}"
		            onclick="openCreatePanel()">
		        + 면담 등록
		    </button>
		</div>
        
        
        <div class="filter-container">
		    <div class="filter-field">
		        <label class="filter-label">조회 시작일</label>
		        <input type="date" id="filterStartDay" class="filter-input">
		    </div>
		    <div class="filter-field">
		        <label class="filter-label">조회 종료일</label>
		        <input type="date" id="filterEndDay" class="filter-input">
		    </div>
		    <div class="filter-field">
		        <label class="filter-label">대상자</label>
		        <select id="filterEmployee" class="filter-select">
		            <option value="" disabled selected>대상자를 선택하세요</option>
		            <option th:each="employee : ${employeeList}"
		                    th:value="${employee.empNo}"
		                    th:text="${employee.name}">
		            </option>
		        </select>
		    </div>
		    <div class="filter-field">
		        <label class="filter-label">면담 구분</label>
		        <select id="filterType" class="filter-select">
		            <option value="" disabled selected>면담 유형 선택</option>
		            <option th:each="interviewType : ${interviewTypeList}"
		                    th:value="${interviewType.id}"
		                    th:text="${interviewType.name}">
		            </option>
		        </select>
		    </div>
		
		    <div class="filter-button-container">
		        <button class="filter-button" onclick="searchInterviews()">조회</button>
		    </div>
		</div>
				
        

        <div class="card">

            <table class="interview-table">

                <thead>
                <tr>
                    <th>면담일시</th>
                    <th>면담구분</th>
                    <th>면담자 사번</th>
                    <th>면담자</th>
                    <th>대상자 사번</th>
                    <th>대상자</th>
                    <th>장소</th>
                    <th>상태</th>
                    <th th:if="${userPosition == '부서장'}">관리</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="interview : ${interviewList}">

                    <td th:text="${interview.startDateTime} + ' ~ ' + ${interview.endDateTime}">
                        2026-05-17
                    </td>

                    <td th:text="${interview.interviewType}">
                        정기 면담
                    </td>

                    <td th:text="${interview.evaluatorNo}">
                        면담자 사번
                    </td>

                    <td th:text="${interview.evaluatorName}">
                        면담자
                    </td>

                    <td th:text="${interview.evaluateeNo}">
                        대상자 사번
                    </td>

                    <td th:text="${interview.evaluateeName}">
                        홍길동
                    </td>

                    <td th:text="${interview.location}">
                        회의실 A
                    </td>

                    <td th:text="${interview.status}">
                            면담 완료

                    </td>

                    <td th:if="${userPosition == '부서장'}">
                    	<input type="hidden" th:id="'hidden-' + ${interview.id}" th:value="${interview.id}" />
                        <button class="edit-btn"
                                onclick="openEditPanel(this)"
                                th:data-id="${interview.id}"
                                th:data-start="${interview.startDateTime}"
        						th:data-end="${interview.endDateTime}"
                                th:data-type="${interview.interviewType}"
                                th:data-emp="${interview.evaluateeNo}"
                                th:data-location="${interview.location}">
                            수정
                        </button>
                    </td>

                </tr>
                 <tr th:if="${#lists.isEmpty(interviewList)}">
			        <td colspan="9">
			            <div class="no-data-card">
			                <p>면담 기록이 없습니다.</p>
			                <p>면담은 부서장이 등록할 수 있으며, 등록 후 사원의 성장과 평가 자료로 활용됩니다.</p>
			            </div>
			        </td>
			    </tr>

                </tbody>

            </table>

        </div>

        <!-- 패널 -->
        <div class="interview-panel"
             id="interviewPanel">

            <div class="panel-header">

                <h2 id="panelTitle">면담 등록</h2>

                <button class="close-btn"
                        onclick="closeInterviewPanel()">
                    ✕
                </button>

            </div>

            <div class="panel-body">

                <!-- 기본 정보 -->
                <div class="form-group">
                    <label>면담 대상자</label>

                    <select class="form-control"id="panelEmployee">
                    	<option value="" disabled selected>대상자를 선택하세요</option>
                        <option
                                th:each="employee : ${employeeList}"
                                th:value="${employee.empNo}"
                                th:text="${employee.name}">
                        </option>

                    </select>
                </div>

                <div class="form-group">
                    <label>면담 구분</label>

                    <select class="form-control"
                            id="panelType">
						<option value=""disabled selected>면담 유형을 선택하세요</option>
                        <option th:each="interviewType : ${interviewTypeList}"
						        th:value="${interviewType.id}"
						        th:text="${interviewType.name}">
						</option>

                    </select>
                </div>
				
                <div class="form-group-inline">
				    <div class="inline-field">
				        <label>면담 시작 시간</label>
				        <input type="datetime-local" class="form-control" id="panelStartTime">
				    </div>
				
				    <div class="inline-field">
				        <label>면담 종료 시간</label>
				        <input type="datetime-local" class="form-control" id="panelEndTime">
				    </div>
				</div>

                <div class="form-group">
                    <label>장소</label>

                    <input type="text"
                           class="form-control"
                           id="panelLocation"
                           placeholder="면담 장소 입력">
                </div>

                <!-- 주제 -->
                <div class="panel-topic-area">

                    <div class="form-group">
					    <label>면담 주제</label>
					    <div id="topicLabelContainer" class="topic-label-container">
					        <!-- JS에서 라벨 버튼 추가 -->
					    </div>
					</div>
					
					<div class="form-group">
					    <label>면담 진행 상태</label>
					    <select class="form-control" id="panelStatus">
					            <option th:each="status : ${statusList}"
							            th:value="${status.code}"
							            th:text="${status.name}">
							    </option>
					    </select>
					</div>
					
					<div class="form-group">
						<label>면담 상세 내용</label>
					      <textarea
                                class="topic-textarea"
                                rows="4"
                                placeholder="면담 내용을 입력하세요.">
               			 </textarea>
					</div>
                 </div>
                 


                <!-- 저장 -->
                <div class="panel-button-area">
				    <button class="save-btn" onclick="saveInterview()">저장</button>
				    
				    <button class="delete-btn" onclick="deleteInterview()">삭제</button>
				</div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
