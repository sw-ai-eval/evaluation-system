<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/default :: layout}">
<head>
    <meta charset="UTF-8">
    <title>면담 관리</title>
    <link rel="stylesheet" th:href="@{/css/interview.css}">
</head>

<body>
<div th:fragment="content">

    <div class="interview-container">

        <!-- 헤더 -->
        <div class="page-header">
		    <div class="header-text">
		        <h1>면담 관리</h1>
		        <p>
		            면담 내용을 기록하여 사원의 성장 및 향후 평가 참고자료로 활용합니다.
		        </p>
		    </div>
		    
		    <button class="open-panel-btn"
		            th:if="${userPosition == '부서장'}"
		            onclick="openCreatePanel()">
		        + 면담 등록
		    </button>
		</div>
        
        
        <form id="interviewFilterForm" action="/interview" method="get">
		    <div class="filter-container">
		        <div class="filter-field">
		            <label class="filter-label">면담 일자</label>
		            <input type="date" name="startDay" id="filterStartDay" class="filter-input">
		        </div>
		        <div class="filter-field" th:if="${userPosition == '부서장'}">
		            <label class="filter-label">대상자</label>
		            <select name="employee" id="filterEmployee" class="filter-select">
		                <option value="">전체</option>
		                <option th:each="employee : ${employeeList}"
		                        th:value="${employee.empNo}"
		                        th:text="${employee.name}">
		                </option>
		            </select>
		        </div>
		        <div class="filter-field">
		            <label class="filter-label">면담 구분</label>
		            <select name="type" id="filterType" class="filter-select">
		                <option value="" disabled selected>면담 유형 선택</option>
		                <option th:each="interviewType : ${interviewTypeList}"
		                        th:value="${interviewType.id}"
		                        th:text="${interviewType.name}">
		                </option>
		            </select>
		        </div>
		        <div class="filter-field">
		            <label class="filter-label">면담 진행 상태</label>
		            <select name="status" id="filterStatus" class="filter-select">
		                <option value="" selected>전체</option>
		                <option th:each="status : ${statusList}"
		                        th:value="${status.code}"
		                        th:text="${status.name}">
		                </option>
		            </select>
		        </div>
		
		        <div class="filter-button-container">
		            <button type="submit" class="filter-button">조회</button>
		        </div>
		    </div>
		</form>
				
        

        <div class="card">
			
            <table class="interview-table">

                <thead>
                <tr>
                    <th>면담일시</th>
                    <th>면담구분</th>
                    <th>면담자 사번</th>
                    <th>면담자</th>
                    <th>대상자 사번</th>
                    <th>대상자</th>
                    <th>장소</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="interview :  ${interviewPage.content}">

                    <td>
                    	<span th:text="|${#temporals.format(interview.startDateTime, 'yyyy-MM-dd')} (${#temporals.format(interview.startDateTime, 'HH:mm')}~${#temporals.format(interview.endDateTime, 'HH:mm')})|"></span>
					</td>
					
                    <td th:text="${interview.interviewTypeName}">
                        정기 면담
                    </td>

                    <td th:text="${interview.evaluatorNo}">
                        면담자 사번
                    </td>

                    <td th:text="${interview.evaluatorName}">
                        면담자
                    </td>

                    <td th:text="${interview.evaluateeNo}">
                        대상자 사번
                    </td>

                    <td th:text="${interview.evaluateeName}">
                        홍길동
                    </td>

                    <td th:text="${interview.place}">
                        회의실 A
                    </td>

                    <td th:text="${interview.status}">
                            면담 완료

                    </td>

                    <td>
					    <input type="hidden" th:id="'hidden-' + ${interview.id}" th:value="${interview.id}" />
					
					    <button class="edit-btn"
					            th:text="${userPosition == '부서장'} ? '수정' : '조회'"
					            th:onclick="${userPosition == '부서장'} ? 'openEditPanel(this, false)' : 'openEditPanel(this, true)'"
					            th:data-id="${interview.id}"
					            th:data-start="${interview.startDateTime}"
					            th:data-end="${interview.endDateTime}"
					            th:data-type="${interview.interviewType}"
					            th:data-emp="${interview.evaluateeNo}"
					            th:data-place="${interview.place}"
					            th:data-topics="${interview.topics}">
					    </button>
					</td>

                </tr>
                 <tr th:if="${#lists.isEmpty(interviewPage.content)}">
			        <td colspan="9">
			            <div class="no-data-card">
			                <p>면담 기록이 없습니다.</p>
			                <p>면담은 부서장이 등록할 수 있으며, 등록 후 사원의 성장과 평가 자료로 활용됩니다.</p>
			            </div>
			        </td>
			    </tr>

                </tbody>

            </table>

			<div th:if="${!#lists.isEmpty(interviewPage.content)}" class="pagination">
			    <ul>
			        <li th:if="${interviewPage.hasPrevious()}">
			            <a th:href="@{/interview(page=${interviewPage.number - 1})}">&laquo; 이전</a>
			        </li>
			        <li th:each="i : ${#numbers.sequence(0, interviewPage.totalPages - 1)}"
			            th:classappend="${i == interviewPage.number} ? 'active'">
			            <a th:href="@{/interview(page=${i})}" th:text="${i + 1}">1</a>
			        </li>
			        <li th:if="${interviewPage.hasNext()}">
			            <a th:href="@{/interview(page=${interviewPage.number + 1})}">다음 &raquo;</a>
			        </li>
			    </ul>
			</div>
        </div>
        <!-- 패널 -->
        <div class="interview-panel" id="interviewPanel">

	            <div class="panel-header">
	
	                <h2 id="panelTitle"></h2>
	
	                <button class="close-btn"
	                        onclick="closeInterviewPanel()">
	                    ✕
	                </button>
	
	            </div>
		            <div class="panel-body">
						<form id="interviewForm">
							<!-- hidden input -->
							<input type="hidden" id="panelInterviewId" name="id" value="">
			                <!-- 기본 정보 -->
			                <div class="form-group">
			                    <label>면담 대상자</label>
			
			                    <select class="form-control"id="panelEmployee" required>
			                    	<option value="" disabled selected >대상자를 선택하세요</option>
			                        <option
			                                th:each="employee : ${employeeList}"
			                                th:value="${employee.empNo}"
			                                th:text="${employee.name}">
			                        </option>
			
			                    </select>
			                </div>
			
			                <div class="form-group">
			                    <label>면담 구분</label>
			
			                    <select class="form-control"
			                            id="panelType" required>
									<option value=""disabled selected>면담 유형을 선택하세요</option>
			                        <option th:each="interviewType : ${interviewTypeList}"
									        th:value="${interviewType.id}"
									        th:text="${interviewType.name}">
									</option>
			
			                    </select>
			                </div>
							
			                <div class="form-group-inline">
							    <div class="inline-field">
							        <label>면담 시작 날짜 및 시각</label>
							        <input type="datetime-local" class="form-control" id="panelStartTime" required>
							    </div>
							
							    <div class="inline-field">
								    <label>면담 종료 시각</label>
								    <input type="time" class="form-control" id="panelEndTime" required>
								</div>
							</div>
			
			                <div class="form-group">
			                    <label>장소</label>
			
			                    <input type="text"
			                           class="form-control"
			                           id="panelPlace"
			                           placeholder="면담 장소 입력" required>
			                </div>
			
			                <!-- 주제 -->
			                <div class="panel-topic-area">
			
			                    <div class="form-group">
								    <label>면담 주제</label>
								    <div id="topicLabelContainer" class="topic-label-container">
								        <!-- JS에서 라벨 버튼 추가 -->
								    </div>
								</div>
								
								<div class="form-group">
								    <label>면담 진행 상태</label>
								    <select class="form-control" id="panelStatus">
								            <option th:each="status : ${statusList}"
										            th:value="${status.code}"
										            th:text="${status.name}">
										    </option>
								    </select>
								</div>
								
								<div class="form-group">
									<label>면담 상세 내용</label>
								      <textarea id="panelTextarea"
								          class="topic-textarea"
								          rows="4"
								          placeholder="면담 내용을 입력하세요."></textarea>
								</div>
			                 </div>
			                 
			
			
			                <!-- 저장 -->
			                <div class="panel-button-area">
							    <button type="button" class="save-btn" onclick="saveInterview()">저장</button>
							    
							    <button type="button" class="delete-btn" onclick="deleteInterview()">삭제</button>
							</div>
						</form>
		            </div>
			
        </div>
    </div>

</div>

</body>
</html>
