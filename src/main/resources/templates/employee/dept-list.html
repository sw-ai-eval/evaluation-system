<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>부서 관리</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-wrapper">

    <div th:replace="~{layout/sidebar :: sidebar('🏢 부서 목록', ~{:: #deptTree})}">
        <div id="deptTree">
            <div class="tree-item active" onclick="loadDeptDetail('S1000', '1본부 (영업)', this)">📂 (S1000) 1본부 (영업)</div>
            <div class="tree-item" style="padding-left: 25px;" onclick="loadDeptDetail('S1100', 'A부서', this)">└ 📄 (S1100) A부서</div>
            <div class="tree-item" style="padding-left: 25px;" onclick="loadDeptDetail('S1200', 'B부서', this)">└ 📄 (S1200) B부서</div>
        </div>
    </div>

    <main class="main-content">
        <div class="top-bar">
            <h2 style="font-size: 19px;">부서 관리</h2>
            <div style="font-size: 12px; color: #888;">🏠 / 시스템관리 / 부서관리</div>
        </div>

        <div class="search-filter" style="padding: 20px 30px; background: #fff; border-bottom: 1px solid #eee; display: flex; gap: 10px;">
            <input type="text" class="form-control" style="width: 150px;" placeholder="부서명">
            <input type="text" class="form-control" style="width: 120px;" placeholder="부서코드">
            <select class="form-control" style="width: 130px;">
                <option>사용여부(전체)</option>
                <option>사용</option>
                <option>미사용</option>
            </select>
            <button class="btn btn-primary">조회</button>
        </div>

        <div class="form-area" style="padding: 20px;">
            <div class="card" style="max-width: 850px; padding: 40px; background:#fff;">
                <h3 id="formTitle" style="margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px;">부서 정보 상세</h3>
                
                <div class="form-group" style="margin-bottom: 15px; display:flex;">
                    <label style="width:150px; font-weight:bold;">상위부서</label>
                    <select class="form-control"><option>1본부 (영업)</option></select>
                </div>
                <div class="form-group" style="margin-bottom: 15px; display:flex;">
                    <label style="width:150px; font-weight:bold;">부서코드</label>
                    <input type="text" id="deptCodeInput" class="form-control" value="S1000" disabled>
                </div>
                <div class="form-group" style="margin-bottom: 15px; display:flex;">
                    <label style="width:150px; font-weight:bold;">부서명 *</label>
                    <input type="text" id="deptNameInput" class="form-control" value="1본부 (영업)" required>
                </div>
                <div class="form-group" style="margin-bottom: 15px; display:flex;">
                    <label style="width:150px; font-weight:bold;">부서장</label>
                    <div style="display:flex; gap:8px; flex:1;">
                        <input type="text" class="form-control" value="홍길동 (2024001)" readonly>
                        <button class="btn btn-secondary">검색</button>
                    </div>
                </div>

                <div style="text-align: right; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                    <button class="btn">복사</button>
                    <button class="btn btn-primary">저장</button>
                    <button class="btn btn-danger">삭제</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function loadDeptDetail(code, name, clickedElement) {
            // 1. 왼쪽 트리에서 기존에 선택된 파란색(active) 지우기
            document.querySelectorAll('.tree-item').forEach(function(el) {
                el.classList.remove('active');
            });
            // 2. 방금 내가 클릭한 것에만 파란색 칠하기
            clickedElement.classList.add('active');

            // 3. 우측 폼의 글씨를 클릭한 데이터로 갈아끼우기
            document.getElementById('formTitle').innerText = name + ' 상세 정보';
            document.getElementById('deptCodeInput').value = code;
            document.getElementById('deptNameInput').value = name;
        }
    </script>
</body>
</html>
