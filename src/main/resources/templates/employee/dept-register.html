<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>부서 등록</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-container">

    <div th:replace="~{layout/sidebar :: sidebar('🏢 부서 관리', ~{:: #deptTree})}">
        <div id="deptTree">
            <div class="tree-item active">📂 (S1000) 1본부 (영업)</div>
            <div class="tree-item" style="padding-left: 25px;">└ 📄 (S1100) A부서</div>
            <div class="tree-item" style="padding-left: 25px;">└ 📄 (S1200) B부서</div>
            <div class="tree-item" style="padding-left: 25px; color: #0056b3;">✨ 신규 부서 등록 중...</div>
        </div>
    </div>

    <main class="main-content">
        <div class="top-bar">
            <h2 style="font-size: 19px;">신규 부서 등록</h2>
            <div style="font-size: 12px; color: #888;">🏠 / 시스템관리 / 부서관리 / 신규등록</div>
        </div>

        <div class="form-area" style="padding: 20px;">
            <div class="card-ui" style="max-width: 850px; padding: 40px; background: #fff; border: 1px solid #dadada; border-radius: 8px;">
                <h3 style="margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px;">부서 정보 입력</h3>
                
                <form action="/dept/register" method="post">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">상위부서</label>
                        <select class="form-control" name="parentDept">
                            <option value="S1000">1본부 (영업)</option>
                            <option value="S2000">2본부 (개발)</option>
                        </select>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">부서코드 *</label>
                        <input type="text" class="form-control" name="deptCode" placeholder="예: S1300 (자동채번 시 비워둠)" required>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">부서명 *</label>
                        <input type="text" class="form-control" name="deptName" placeholder="등록할 부서명을 입력하세요" required>
                    </div>

                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">사용여부</label>
                        <div style="display:flex; gap: 20px; flex:1;">
                            <label style="font-weight:normal;"><input type="radio" name="useYn" value="Y" checked> 사용</label>
                            <label style="font-weight:normal;"><input type="radio" name="useYn" value="N"> 미사용</label>
                        </div>
                    </div>

                    <div style="text-align: right; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                        <button type="button" class="btn btn-secondary" onclick="location.href='/dept/list'">목록으로</button>
                        <button type="submit" class="btn btn-primary">등록 저장</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
