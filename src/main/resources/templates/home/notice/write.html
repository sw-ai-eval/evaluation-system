<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
<meta charset="UTF-8">
<title>공지사항 작성</title>

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #f5f7fa;
    }

    .container {
        max-width: 800px;
        margin: 60px auto;
        background: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }

    .title {
        font-size: 22px;
        font-weight: 600;
        color: #333;
    }

    .back-btn {
        padding: 8px 14px;
        border: none;
        background-color: #e2e8f0;
        color: #333;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
    }

    .back-btn:hover {
        background-color: #cbd5e0;
    }

    .form-group {
        margin-bottom: 25px;
    }

    .form-label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #444;
    }

    .form-input {
        width: 100%;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
        transition: 0.2s;
        box-sizing: border-box;
    }

    .form-input:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 2px rgba(79,70,229,0.1);
    }

    textarea.form-input {
        height: 200px;
        resize: none;
    }

    .submit-btn {
	    width: 100%;
	    padding: 14px;
	    background-color: #6366b3;
	    color: white;
	    border: none;
	    border-radius: 8px;
	    font-size: 15px;
	    font-weight: 500;
	    cursor: pointer;
	    transition: 0.2s;
	}
	
	.submit-btn:hover {
	    background-color: #5558a3;
	}
</style>

</head>

<body>

<div class="container">

    <div class="header">
        <div class="title">공지사항 / 알림 작성</div>
        <button class="back-btn" onclick="history.back()">← 이전</button>
    </div>

    <form th:action="@{/admin/notice/save}" method="post">
	
	    <input type="hidden" name="createBy" th:value="${empNo}">
	
	    <div class="form-group">
	        <label class="form-label">타입</label>
	        <select class="form-input" name="type" required>
	            <option value="" disabled selected>타입을 선택하세요</option>
	            <option value="system">시스템</option>
	            <option value="알림">알림</option>
	            <option value="주의">주의</option>
	            <option value="중요">중요</option>
	        </select>
	    </div>
	
	    <div class="form-group">
	        <label class="form-label">제목</label>
	        <input type="text" class="form-input" name="title"
	               placeholder="공지 제목을 입력하세요" required>
	    </div>
	
	    <div class="form-group">
	        <label class="form-label">내용</label>
	        <textarea class="form-input" name="content"
	                  placeholder="공지 내용을 입력하세요" required></textarea>
	    </div>
	
	    <button type="submit" class="submit-btn">공지 등록</button>
	
	</form>

</div>

</body>
</html>
