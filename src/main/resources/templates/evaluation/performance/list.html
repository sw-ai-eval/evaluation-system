<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성과/업무평가 및 조회</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; display: flex; background-color: #f8f9fa; font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; color: #333; }
        .main-content { flex-grow: 1; padding: 20px 30px; box-sizing: border-box; background: #fff; }
        h2 { font-size: 20px; margin-top: 0; margin-bottom: 20px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        /* 상단 검색 영역 */
        .search-area { background: #f8f9fa; border: 1px solid #e9ecef; padding: 12px 20px; display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .search-item { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .search-item select { padding: 5px 30px 5px 10px; border: 1px solid #ced4da; border-radius: 4px; background-color: #fff; height: 32px; }
        .btn-search { background-color: #0d6efd; color: white; border: none; padding: 0 20px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; }
        
        /* 분할 컨테이너 */
        .split-container { display: flex; gap: 20px; height: calc(100vh - 180px); }
        
        /* 좌측 패널 (목록) */
        .left-panel { flex: 4; display: flex; flex-direction: column; border: 1px solid #dee2e6; background: #fff; position: relative; }
        .tabs { display: flex; border-bottom: 1px solid #dee2e6; background: #f8f9fa; margin: 0; padding: 0; list-style: none; }
        .tabs li { padding: 10px 20px; font-size: 13px; cursor: pointer; border-right: 1px solid #dee2e6; color: #495057; }
        .tabs li.active { background: #fff; font-weight: bold; color: #000; border-bottom: 1px solid #fff; margin-bottom: -1px; }
        
        .table-wrap { overflow-y: auto; flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; }
        th { background-color: #f1f3f5; border: 1px solid #dee2e6; padding: 10px; font-weight: 500; color: #495057; }
        td { border: 1px solid #dee2e6; padding: 10px; vertical-align: middle; }
        
        .left-panel th { background-color: #e9ecef; }
        .left-panel .clickable-row { cursor: pointer; }
        .left-panel .clickable-row.selected { background-color: #e6f2ff; font-weight: 500; }
        .left-panel .clickable-row:hover { background-color: #f8f9fa; }
        
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        
        .pagination-wrap { padding: 10px; border-top: 1px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; background: #fff; font-size: 12px; color: #6c757d; }
        .pagination { display: flex; gap: 5px; }
        .pagination button { background: #fff; border: 1px solid #dee2e6; padding: 3px 8px; cursor: pointer; color: #0d6efd; border-radius: 3px; }
        .pagination button.active { background: #0d6efd; color: #fff; border-color: #0d6efd; }
        
        /* 우측 패널 (상세) */
        .right-panel { flex: 6; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 5px; display: none; /* 초기에는 숨김 */ }
        .detail-header { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: bold; }
        
        .info-section { display: flex; gap: 15px; align-items: stretch; }
        .info-table { flex-grow: 1; }
        .grade-box { width: 120px; border: 1px solid #dee2e6; display: flex; flex-direction: column; text-align: center; }
        .grade-box-title { background: #e6f2ff; padding: 10px; font-size: 12px; font-weight: 500; border-bottom: 1px solid #dee2e6; }
        .grade-box-score { padding: 15px; font-size: 16px; font-weight: bold; background: #fff; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        
        .sub-title { background-color: #e9ecef; padding: 8px 15px; font-size: 13px; font-weight: bold; border: 1px solid #dee2e6; border-bottom: none; }
        .detail-table th { background-color: #f8f9fa; }
        .feedback-textarea { width: 100%; height: 120px; padding: 8px; box-sizing: border-box; resize: vertical; border: none; font-family: inherit; font-size: 12px; line-height: 1.5; outline: none; }
        .feedback-textarea:focus { background-color: #f8f9fa; }
        .readonly-bg { background-color: #f8f9fa !important; color: #6c757d; cursor: not-allowed; }
        
        .score-input { width: 50px; text-align: center; border: 1px solid #ccc; padding: 4px; border-radius: 3px; outline: none; font-weight: normal; }
        
        .btn-save { background-color: #0d6efd; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .btn-save:hover { background-color: #0b5ed7; }
    </style>
</head>
<body>
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <div class="main-content">
        <h2>성과/업무평가 및 조회 
            <i class="far fa-question-circle" 
                style="color:#ccc; font-size:14px; cursor:pointer;" 
                title="평가 진행 순서: [본인 평가 작성 및 제출] ➡️ [부서장 1차 평가]">
            </i>
        </h2>
        
        <div class="search-area">
            <div class="search-item">
                <span>기준년도</span>
                <select id="searchYear">
                    <option th:each="y : ${yearList}" 
                            th:value="${y}" 
                            th:text="${y}"
                            th:selected="${y == #calendars.year(#calendars.createNow())}">
                    </option>
                </select>
            </div>
            <div class="search-item">
                <span>평가기간</span>
                <select id="searchPeriod">
                    <option value="연간" th:selected="${selectedPeriod == null or selectedPeriod == '연간'}">연간</option>
                    <option value="상반기" th:selected="${selectedPeriod == '상반기'}">상반기</option>
                    <option value="하반기" th:selected="${selectedPeriod == '하반기'}">하반기</option>
                </select>
            </div>
            <button class="btn-search" onclick="searchEval()">조회</button>
        </div>

        <div class="split-container">
            <div class="left-panel">
                <ul class="tabs">
                    <li class="active">진행 문서</li>
                    <li>확정 문서</li>
                </ul>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>평가수행기간</th>
                                <th>부서명</th>
                                <th>직위</th>
                                <th>대상사번</th>
                                <th>대상자명</th>
                                <th>상태</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="eval : ${evalList}" 
                                class="clickable-row" 
                                th:data-typeid="${eval.typeId}" 
                                th:data-empno="${eval.empNo}" 
                                onclick="loadEvalDetail(this)">
                                <td th:text="${eval.evalPeriod}">11.24 - 01.30</td>
                                <td th:text="${eval.deptName}">개발팀</td>
                                <td th:text="${eval.position}">선임</td>
                                <td th:text="${eval.empNo}">1001</td>
                                <td th:text="${eval.empName}">홍길동</td>
                                <td><span class="badge" th:text="${eval.status}">본인평가중</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination-wrap">
                    <div class="pagination">
                        <button disabled><i class="fas fa-step-backward"></i></button>
                        <button disabled><i class="fas fa-caret-left"></i></button>
                        <button class="active">1</button>
                        <button disabled><i class="fas fa-caret-right"></i></button>
                        <button disabled><i class="fas fa-step-forward"></i></button>
                    </div>
                    <div>1 - 1 of 1 items</div>
                </div>
            </div>

            <div class="right-panel" id="detailPanel">
                <div class="detail-header">
                    성과/업무평가 상세 <span class="badge" id="detailStatusBadge">대기</span>
                </div>
                
                <div class="info-section">
                    <div class="info-table">
                        <table>
                            <tr>
                                <th>부서</th><th>직위</th><th>직책</th><th>직종</th><th>사번</th><th>성명</th>
                            </tr>
                            <tr>
                                <td id="infoDept"></td>
                                <td id="infoPos"></td>
                                <td id="infoTitle">팀원</td>
                                <td id="infoJob">일반직</td>
                                <td id="infoEmpNo"></td>
                                <td id="infoName"></td>
                            </tr>
                        </table>
                    </div>
                    <div class="grade-box">
                        <div class="grade-box-title">종합평가등급</div>
                        <div class="grade-box-score" id="infoGrade">-</div>
                    </div>
                </div>

                <form id="evalForm">
                    <input type="hidden" id="currentTypeId">
                    <input type="hidden" id="currentEmpNo">
                    
                    <div>
                        <div class="sub-title">주요 수행업무 평가</div>
                        <table class="detail-table" style="width: 100%; border-collapse: collapse; text-align: center; border: 1px solid #dee2e6;">
                            <colgroup>
                                <col width="10%"><col width="25%"><col width="8%"><col width="50%"><col width="7%">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th>구분</th>
                                    <th>항목<br>(업무 목표)</th>
                                    <th>배점</th>
                                    <th>업무 수행 과정 및 결과 / 잘된 점 - 개선할 점</th>
                                    <th>평가<br>점수</th>
                                </tr>
                            </thead>
                            <tbody id="evalItemBody"></tbody>
                        </table>
                        
                        <div style="text-align: right; margin-top: 15px;" id="actionButtons"></div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const currentUserNo = '[[${#authentication.name}]]';

        function loadEvalDetail(rowElement) {
            const typeId = rowElement.getAttribute('data-typeid');
            const empNo = rowElement.getAttribute('data-empno');

            document.querySelectorAll('.clickable-row').forEach(row => row.classList.remove('selected'));
            rowElement.classList.add('selected');

            fetch(`/evaluation/performance/detail/${typeId}/${empNo}`)
                .then(res => {
                    if (!res.ok) throw new Error("서버 에러 발생");
                    return res.json();
                })
                .then(data => {
                    // 🌟 서버에서 에러 객체(500 등)가 반환되었을 때의 방어 로직
                    if (data.status && typeof data.status === 'number' && data.status >= 400) {
                        alert("해당 사용자의 평가 데이터를 불러올 수 없습니다. (DB 데이터 확인 필요)");
                        return;
                    }
                    if (data.error) {
                        alert("오류: " + data.error);
                        return;
                    }

                    document.getElementById('detailPanel').style.display = 'flex'; 
                    
                    document.getElementById('infoDept').innerText = data.deptName;
                    document.getElementById('infoPos').innerText = data.position;
                    document.getElementById('infoEmpNo').innerText = data.empNo;
                    document.getElementById('infoName').innerText = data.empName;
                    document.getElementById('infoGrade').innerText = data.totalGrade || '-';
                    document.getElementById('detailStatusBadge').innerText = data.status;

                    document.getElementById('currentTypeId').value = data.typeId;
                    document.getElementById('currentEmpNo').value = data.empNo;

                    const isMyDoc = (data.empNo === currentUserNo);
                    const isDeptHead = (data.leaderEmpNo === currentUserNo);
                    
                    const canEditSelf = isMyDoc && data.status === '본인평가중';
                    const canEditFirst = isDeptHead && !isMyDoc && data.status === '1차평가대기';

                    let tbodyHtml = '';
                    if (data.items && data.items.length > 0) {
                        data.items.forEach(item => {
                            const selfReadonly = canEditSelf ? '' : 'readonly';
                            const selfClass = canEditSelf ? 'feedback-textarea' : 'feedback-textarea readonly-bg';
                            const weight = item.weight || 0;
                            
                            tbodyHtml += `
                                <tr>
                                    <td style="text-align:center; vertical-align:middle; background:#fff;"><b>${item.categoryName || '주요 업무'}</b></td>
                                    <td style="text-align:center; vertical-align:middle; background:#fff; font-size:12px;">
                                        ${item.goalDesc}
                                    </td>
                                    <td style="background:#fff;">${weight}</td>
                                    <td style="text-align:left; vertical-align:top; background:#fff; padding: 0;">
                                        <textarea name="selfFeedback_${item.questionId}" class="${selfClass}" ${selfReadonly} placeholder="업무 수행 과정 및 결과, 잘된 점/개선할 점을 입력하세요.">${item.selfFeedback || ''}</textarea>
                                    </td>
                                    <td style="background:#fff; vertical-align:middle;">
                                        <input type="number" name="selfScore_${item.questionId}" value="${item.selfScore || ''}" ${selfReadonly} 
                                            class="score-input ${selfReadonly ? 'readonly-bg' : ''}"
                                            min="0" max="${weight}" oninput="validateInput(this, ${weight})">
                                    </td>
                                </tr>
                            `;

                            if (data.status !== '본인평가중' && !isMyDoc) {
                                const firstReadonly = canEditFirst ? '' : 'readonly';
                                const firstClass = canEditFirst ? 'feedback-textarea' : 'feedback-textarea readonly-bg';
                                
                                tbodyHtml += `
                                    <tr style="background-color: #f1f3f5;">
                                        <td colspan="3" style="color:#0d6efd; font-weight:bold; font-size:11px;">[부서장 피드백]</td>
                                        <td style="text-align:left; padding:0;">
                                            <textarea name="firstFeedback_${item.questionId}" class="${firstClass}" ${firstReadonly} placeholder="부서장 평가 의견을 입력하세요.">${item.firstFeedback || ''}</textarea>
                                        </td>
                                        <td>
                                            <input type="number" name="firstScore_${item.questionId}" value="${item.firstScore || ''}" ${firstReadonly} 
                                                class="score-input ${firstReadonly ? 'readonly-bg' : ''}"
                                                min="0" max="${weight}" oninput="validateInput(this, ${weight})">
                                        </td>
                                    </tr>
                                `;
                            }
                        });
                    } else {
                        tbodyHtml = `<tr><td colspan="5">등록된 평가 문항이 없습니다.</td></tr>`;
                    }
                    
                    document.getElementById('evalItemBody').innerHTML = tbodyHtml;

                    let btnHtml = '';
                    if (canEditSelf) {
                        btnHtml = `
                            <button type="button" class="btn-save" style="background-color: #6c757d; margin-right: 5px;" onclick="submitEval('SELF', false)">임시 저장</button>
                            <button type="button" class="btn-save" onclick="submitEval('SELF', true)">최종 제출</button>
                        `;
                    } else if (canEditFirst) {
                        btnHtml = `
                            <button type="button" class="btn-save" style="background-color: #6c757d; margin-right: 5px;" onclick="submitEval('FIRST', false)">임시 저장</button>
                            <button type="button" class="btn-save" onclick="submitEval('FIRST', true)">1차 평가 제출</button>
                        `;
                    }
                    document.getElementById('actionButtons').innerHTML = btnHtml;
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    alert("데이터를 가져오는 중 문제가 발생했습니다.");
                });
        }

        function validateInput(input, maxWeight) {
            const val = parseInt(input.value);
            if (val < 0) {
                alert("음수는 입력할 수 없습니다.");
                input.value = 0;
            } else if (val > maxWeight) {
                alert(`배점(${maxWeight})을 초과할 수 없습니다.`);
                input.value = maxWeight;
            }
        }

        function submitEval(step, isSubmit) {
            const prefix = (step === 'SELF') ? 'self' : 'first'; 
            const scoreInputs = document.querySelectorAll(`input[name^="${prefix}Score_"]`);
            
            for (let input of scoreInputs) {
                if (input.value !== '') { 
                    const val = parseInt(input.value);
                    const maxWeight = parseInt(input.getAttribute('max'));
                    if (val < 0 || val > maxWeight) {
                        alert("점수 입력 값이 올바르지 않습니다. 다시 확인해주세요.");
                        input.focus();
                        return;
                    }
                }
            }

            if (isSubmit) {
                let isComplete = true;
                for (let input of scoreInputs) {
                    const qId = input.name.split('_')[1];
                    const feedback = document.querySelector(`textarea[name="${prefix}Feedback_${qId}"]`).value.trim();
                    
                    if (input.value === '' || feedback === '') {
                        isComplete = false;
                        break;
                    }
                }

                if (!isComplete) {
                    alert("모든 항목의 내용과 점수를 입력해야 제출할 수 있습니다.");
                    return; 
                }
                if(!confirm("제출 후에는 수정할 수 없습니다. 최종 제출하시겠습니까?")) return;
            } else {
                if(!confirm("현재까지 작성된 내용을 임시 저장하시겠습니까?")) return;
            }
            
            const items = [];
            scoreInputs.forEach(input => {
                const qId = input.name.split('_')[1];
                const feedbackValue = document.querySelector(`textarea[name="${prefix}Feedback_${qId}"]`).value;
                
                const scoreValue = input.value === '' ? null : parseInt(input.value);

                if (step === 'SELF') {
                    items.push({ questionId: qId, selfFeedback: feedbackValue, selfScore: scoreValue });
                } else {
                    items.push({ questionId: qId, firstFeedback: feedbackValue, firstScore: scoreValue });
                }
            });

            const data = {
                step: step,
                subCheck: isSubmit ? "Y" : "N",
                typeId: document.getElementById('currentTypeId').value,
                empNo: document.getElementById('currentEmpNo').value,
                items: items
            };

            fetch('/evaluation/performance/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.text())
            .then(result => {
                if(result === 'success') {
                    alert(isSubmit ? "성공적으로 제출되었습니다." : "임시 저장되었습니다.");
                    location.reload(); 
                } else {
                    alert("저장 실패: " + result);
                }
            });
        }
        
        function searchEval() {
            const year = document.getElementById('searchYear').value;
            const period = document.getElementById('searchPeriod').value;
            location.href = `/evaluation/performance/list?year=${year}&period=${period}`;
        }
    </script>
</body>
</html>
