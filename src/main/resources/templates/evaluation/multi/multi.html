<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>다면평가 및 조회</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; display: flex; background-color: #f8f9fa; font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; color: #333; }
        .main-content { flex-grow: 1; padding: 20px 30px; box-sizing: border-box; background: #fff; }
        h2 { font-size: 20px; margin-top: 0; margin-bottom: 20px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        /* 상단 검색 영역 */
        .search-area { background: #f8f9fa; border: 1px solid #e9ecef; padding: 12px 20px; display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .search-item { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .search-item select { padding: 5px 30px 5px 10px; border: 1px solid #ced4da; border-radius: 4px; background-color: #fff; height: 32px; }
        .btn-search { background-color: #0d6efd; color: white; border: none; padding: 0 20px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; }
        
        /* 분할 컨테이너 */
        .split-container { display: flex; gap: 20px; height: calc(100vh - 180px); }
        
        /* 좌측 패널 (목록) */
        .left-panel { flex: 4; display: flex; flex-direction: column; border: 1px solid #dee2e6; background: #fff; position: relative; }
        .tabs { display: flex; border-bottom: 1px solid #dee2e6; background: #f8f9fa; margin: 0; padding: 0; list-style: none; }
        .tabs li { padding: 10px 20px; font-size: 13px; cursor: pointer; border-right: 1px solid #dee2e6; color: #495057; }
        .tabs li.active { background: #fff; font-weight: bold; color: #000; border-bottom: 1px solid #fff; margin-bottom: -1px; }
        .tabs li a {
		    text-decoration: none;
		    color: inherit;
		    display: block;
		}

        .table-wrap { overflow-y: auto; flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; }
        th { background-color: #f1f3f5; border: 1px solid #dee2e6; padding: 10px; font-weight: 500; color: #495057; }
        td { border: 1px solid #dee2e6; padding: 10px; vertical-align: middle; }
        
        .left-panel th { background-color: #e9ecef; }
        .left-panel .clickable-row { cursor: pointer; }
        .left-panel .clickable-row.selected { background-color: #e6f2ff; font-weight: 500; }
        .left-panel .clickable-row:hover { background-color: #f8f9fa; }
        
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }

		.success{ padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #28a745;; color: #fff; border: 1px solid rgb(0, 128, 0); }

        .pagination-wrap { padding: 10px; border-top: 1px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; background: #fff; font-size: 12px; color: #6c757d; }
        .pagination { display: flex; gap: 5px; }
        .pagination button { background: #fff; border: 1px solid #dee2e6; padding: 3px 8px; cursor: pointer; color: #0d6efd; border-radius: 3px; }
        .pagination button.active { background: #0d6efd; color: #fff; border-color: #0d6efd; }
        
        /* 우측 패널 (상세) */
        .right-panel { flex: 6; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 5px; display: none; /* 초기에는 숨김 */ }
        .detail-header { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: bold; }
        
        .info-section { display: flex; gap: 15px; align-items: stretch; }
        .info-table { flex-grow: 1; }

        .sub-title { background-color: #e9ecef; padding: 8px 15px; font-size: 13px; font-weight: bold; border: 1px solid #dee2e6; border-bottom: none; }
        .detail-table th { background-color: #f8f9fa; }
        .feedback-textarea { width: 100%; height: 120px; padding: 8px; box-sizing: border-box; resize: vertical; border: none; font-family: inherit; font-size: 12px; line-height: 1.5; outline: none; }
        .feedback-textarea:focus { background-color: #f8f9fa; }
        .readonly-bg { background-color: #f8f9fa !important; color: #6c757d; cursor: not-allowed; }
        
        .score-input { width: 50px; text-align: center; border: 1px solid #ccc; padding: 4px; border-radius: 3px; outline: none; font-weight: normal; }
        
        .btn-save { background-color: #0d6efd; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .btn-save:hover { background-color: #0b5ed7; }
        
		        /* 기업 평가 시스템 스타일 버튼 */
		.btn-eval-start {
		    background: linear-gradient(90deg, #0d6efd, #0b5ed7);
		    color: #fff;
		    border: none;
		    padding: 10px 25px;
		    font-size: 14px;
		    font-weight: 600;
		    border-radius: 6px;
		    cursor: pointer;
		    display: inline-flex;
		    align-items: center;
		    gap: 8px;
		    transition: all 0.2s ease-in-out;
		    box-shadow: 0 3px 6px rgba(0,0,0,0.1);
		}
		
		.btn-eval-start:hover {
		    background: linear-gradient(90deg, #0b5ed7, #084298);
		    transform: translateY(-2px);
		    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
		}
		
		.btn-eval-start:active {
		    transform: translateY(0);
		    box-shadow: 0 3px 6px rgba(0,0,0,0.1);
		}
		
		/* 버튼 컨테이너 스타일 */
		.detail-button-group {
		    display: flex;               /* 가로로 배치 */
		    justify-content: space-between; /* 좌측-우측 정렬 */
		    align-items: center;         /* 수직 가운데 정렬 */
		    margin-top: 15px;            /* 상단 여백 */
		}
		
		/* 닫기 버튼 스타일 */
		button.close-btn {
		    background-color: #f0f0f0;
		    color: #333;
		    border: 1px solid #ccc;
		    border-radius: 4px;
		    padding: 6px 12px;
		    font-size: 14px;
		    cursor: pointer;
		    transition: all 0.2s ease;
		}
		
		button.close-btn:hover {
		    background-color: #e0e0e0;
		    border-color: #999;
		    color: #000;
		}
		
		button.close-btn:active {
		    transform: translateY(1px);
		}
		.grade-select { width: 65px; text-align: center; border: 1px solid #ccc; padding: 4px; border-radius: 3px; outline: none; font-weight: bold; margin-bottom: 5px; }
        .calculated-score { font-size: 14px; font-weight: bold; color: #0d6efd; margin-top: 5px; }

        /* 평가 착안점 텍스트 가독성 개선 */
        .goal-desc-text {
            font-size: 12px;
            color: #343a40;
            line-height: 1.6;
        }

        /* 합계 행 중앙정렬 */
        .total-row-label {
            text-align: center;
            padding-right: 0;
            font-size: 14px;
        }
        .total-score-row td {
		    text-align: center;           /* 핵심: 중앙 정렬 */
		    font-size: 15px;              /* 글자 키움 */
		    font-weight: 700;             /* 굵게 */
		    padding: 14px 10px;           /* 여유 공간 */
		    color: #1f3b57;               /* 차분한 네이비 계열 */
		    background-color: #f4f7fb;    /* 은은한 강조 배경 */
		    border-top: 2px solid #d6e2f0;/* 위 구분선 */
		    letter-spacing: 0.3px;        /* 가독성 */
		}
		
		#totalScore {
		    font-size: 18px;              /* 숫자 더 강조 */
		    font-weight: 800;
		    color: #2b6cb0;               /* 포인트 블루 */
		}
    </style>
</head>

        icon: 'warning',

<script type="text/javascript">
window.onload = () => {
    loadProgress(0);
};
const currentUserNo = '[[${#authentication.name}]]';
const currentUserPosition = '[[${userPosition}]]';

function loadEvalDetail(rowElement) {
	const evalTypeId = rowElement.dataset.evalTypeId;
    const evaluateeNo = rowElement.dataset.empno;
    const evaluatorNo = rowElement.dataset.evaluatorNo;
    
    console.log
    
    // 선택한 행 강조
    document.querySelectorAll('.clickable-row').forEach(row => row.classList.remove('selected'));
    rowElement.classList.add('selected');

    // 🔹 현재 선택 정보 숨겨진 input에 저장
    document.getElementById('currentTypeId').value = evalTypeId;
    document.getElementById('currentEmpNo').value = evaluateeNo;
    document.getElementById('currentEvaluatorNo').value = evaluatorNo;
    
    fetch(`/evaluation/multi/detail/${evalTypeId}/${evaluatorNo}/${evaluateeNo}`)
        .then(res => res.json())
        .then(data => {
            const status = String(data.statusName || '').trim();
            const isCompleted = status === '평가 완료' || status === '평가완료';
            const isSelf = String(currentUserNo) === String(data.evaluateeNo);
            const isEvaluator = String(currentUserNo) === String(data.evaluatorNo);

            // 우측 패널
            const detailPanel = document.getElementById('detailPanel');
            detailPanel.style.display = 'flex';

            // 기본 정보
                        document.getElementById('infoDept').innerText = data.deptName || '-';
            document.getElementById('infoTitle').innerText = data.position || '-';
            document.getElementById('infoPos').innerText = data.levelName || '-';
            document.getElementById('infoEmpNo').innerText = data.evaluateeNo || '-';
            document.getElementById('infoName').innerText = data.evaluateeName || '-';

            // 상태 배지
            const badge = document.getElementById('detailStatusBadge');
            badge.innerText = status || '대기';
            badge.classList.toggle('success', isCompleted);
            badge.classList.toggle('badge', !isCompleted);

            // 시작 버튼 표시/숨김
            const actionButtons = document.getElementById('actionButtons');
            actionButtons.style.display = (isCompleted || isSelf || !isEvaluator) ? 'none' : 'block';
            const tfoot = document.getElementById('evalTfoot');
            
            const totalScoreEl = document.getElementById('totalScore');
            if (totalScoreEl) {
                totalScoreEl.innerText = data.totalScore ?? 0;
            }

            // 👉 이거 추가
            const totalScoreRow = document.getElementById('totalScoreRow');
            if (totalScoreRow) {
                totalScoreRow.style.display = 'table-row';
            }

            // 🔹 테이블 초기화
            document.getElementById('evalGuideBody').innerHTML = '';
            document.getElementById('evalResultBody').innerHTML = '';
            
            // 테이블 렌더링
            if (isCompleted) {
                renderResultTableSafe(data.items);
                tfoot.style.display = '';
            } else {
                renderGuideTableSafe(data.categorySummaries);
                tfoot.style.display = 'none';
            }
            
            
            if (data.chart && currentUserPosition?.trim() === "부서장" && isCompleted) {
                document.getElementById('chartWrap').style.display = 'block';
                renderChart(data.chart, data.evaluateeName);
            } else {
                document.getElementById('chartWrap').style.display = 'none';
            }
        });
}

// 안전하게 결과 테이블 렌더링
function renderResultTableSafe(items) {
    const tbody = document.getElementById('evalResultBody');
    if (!tbody) {
        console.warn('evalResultBody not found!');
        return;
    }
    tbody.innerHTML = ''; // 초기화

    items.forEach(item => {
        const tr = document.createElement('tr');

        // 점수 문항
/*         const tdCategory=document.createElement('td');
        tdQuestion.innerText = item.category || '-'; */
        const tdQuestion = document.createElement('td');
        tdQuestion.innerText = item.question || '-';
        const tdScore = document.createElement('td');
        tdScore.innerText = item.score != null ? item.score : '-';
        const tdFeedback = document.createElement('td');
        tdFeedback.innerText = item.content || '-';

        tr.append(tdQuestion, tdScore, tdFeedback);
        tbody.appendChild(tr);
    });

    // 헤더 표시
	const guideHeader = document.getElementById('guideHeader');
	const resultHeader = document.getElementById('resultHeader');
	const guideColgroup = document.getElementById('guideColgroup');
	const resultColgroup = document.getElementById('resultColgroup');
	
	if (guideHeader) {
	    guideHeader.style.display = 'none';
	    guideColgroup.style.display = 'none';
	}
	
	if (resultHeader) {
	    resultHeader.style.display = 'table-header-group';
	    resultColgroup.style.display = 'table-column-group';
	}
   
}
let avgChartInstance = null;

function renderChart(chartData,evaluateeName) {
    const maxScores = chartData.maxScores || []; // 혹시 undefined면 빈 배열

    // 데이터 정규화 (0~5 범위)
    const myAvgScoresNormalized = chartData.myAvgScores.map((score, idx) => {
        const max = maxScores[idx] || 1;  // 최대값이 없으면 1
        return (score / max) * 5;
    });

    const allAvgScoresNormalized = chartData.allAvgScores.map((score, idx) => {
        const max = maxScores[idx] || 1;
        return (score / max) * 5;
    });
    
    const ctx = document.getElementById('avgChart');
    if (!ctx) return;

    if (avgChartInstance) avgChartInstance.destroy();

    avgChartInstance = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: chartData.labels,
            datasets: [
                {
                	label: `${evaluateeName}의 평균`,
                    data: myAvgScoresNormalized,
                    backgroundColor: 'rgba(78, 115, 223, 0.2)',
                    borderColor: '#4e73df',
                    borderWidth: 2,
                    pointBackgroundColor: '#4e73df'
                },
                {
                    label: '전체 부서장 평균',
                    data: allAvgScoresNormalized,
                    backgroundColor: 'rgba(28, 200, 138, 0.2)',
                    borderColor: '#1cc88a',
                    borderWidth: 2,
                    pointBackgroundColor: '#1cc88a'
                }
            ]
        },
        options: {
            scales: {
                r: {
                    beginAtZero: true,
                    suggestedMin: 0,
                    suggestedMax: 5,
                }
            },
            plugins: {
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            const idx = context.dataIndex;
                            const datasetLabel = context.dataset.label;
                            let originalValue;
                            if (datasetLabel === `${evaluateeName}의 평균`) {
                                originalValue = chartData.myAvgScores[idx];
                            } else if (datasetLabel === '전체 부서장 평균') {
                                originalValue = chartData.allAvgScores[idx];
                            }
                            return `${datasetLabel}: ${originalValue}`;
                        }
                    }
                },
                legend: {
                    display: true,
                    position: 'top'
                }
            },
            responsive: true,
            maintainAspectRatio: false
        }
    });
}


// 안전하게 가이드 테이블 렌더링
function renderGuideTableSafe(categories) {
    const tbody = document.getElementById('evalGuideBody');
    if (!tbody) {
        console.warn('evalGuideBody not found!');
        return;
    }
    tbody.innerHTML = '';

    categories.forEach(cat => {
        const tr = document.createElement('tr');

        const tdCategory = document.createElement('td');
        tdCategory.innerText = cat.categoryName || '-';

        const tdGuide = document.createElement('td');
        tdGuide.innerText = cat.combinedGuide || '-';

        const tdWeight = document.createElement('td');
        tdWeight.innerText = cat.totalWeight != null ? cat.totalWeight : '-';

        tr.append(tdCategory, tdGuide, tdWeight);
        tbody.appendChild(tr);
    });

    const guideHeader = document.getElementById('guideHeader');
    const resultHeader = document.getElementById('resultHeader');
    const guideColgroup = document.getElementById('guideColgroup');
    const resultColgroup = document.getElementById('resultColgroup');

    if (guideHeader) {
        guideHeader.style.display = 'table-header-group';
        guideColgroup.style.display = 'table-column-group';
    }

    if (resultHeader) {
        resultHeader.style.display = 'none';
        resultColgroup.style.display = 'none';
    }
}

function setEvalMode(isResult) {

function searchEval() {

    const activeTab = document.querySelector(".tabs li.active").id;

    if (activeTab === "tab-progress") {
        loadProgress(0);
    } else {
        loadCompleted(0);
    }
}
let currentTab = "progress";
let progressPage = 0;
let completedPage = 0;

document.getElementById("tab-progress").onclick = () => {
    currentTab = "progress";
    switchTab();
    loadProgress(0);
};

document.getElementById("tab-completed").onclick = () => {
    currentTab = "completed";
    switchTab();
    loadCompleted(0);
};

function switchTab() {
    document.getElementById("progressWrap").style.display =
        currentTab === "progress" ? "block" : "none";

    document.getElementById("completedWrap").style.display =
        currentTab === "completed" ? "block" : "none";
}
function loadProgress(page = 0) {
    progressPage = page;
	
    const year = document.getElementById("searchYear").value;
    const period = document.getElementById("searchPeriod").value;

    fetch(`/evaluation/multi/progress?page=${page}&size=10&year=${year}&period=${period}`)
        .then(res => res.json())
        .then(data => {

            const tbody = document.getElementById("progressBody");
            tbody.innerHTML = "";
            
            if (!data.content || data.content.length === 0) {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td colspan="9" style="text-align:center; padding:20px; color:#888;">
                        진행 중인 평가가 없습니다.
                    </td>
                `;
                tbody.appendChild(tr);
                return;
            }

            data.content.forEach(e => {
                tbody.appendChild(createRow(e));
            });

            renderProgressPaging(data);
        });
}
function loadCompleted(page = 0) {
    completedPage = page;

    const year = document.getElementById("searchYear").value;
    const period = document.getElementById("searchPeriod").value;

    fetch(`/evaluation/multi/completed?page=${page}&size=10&year=${year}&period=${period}`)
        .then(res => res.json())
        .then(data => {

            const tbody = document.getElementById("completedBody");
            tbody.innerHTML = "";
            
            if (!data.content || data.content.length === 0) {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td colspan="9" style="text-align:center; padding:20px; color:#888;">
                        진행 중인 평가가 없습니다.
                    </td>
                `;
                tbody.appendChild(tr);
                return;
            }



            data.content.forEach(e => {
            	tbody.appendChild(createRow(e));
            });

            renderCompletedPaging(data);
        });
}

function createRow(e) {
    const tr = document.createElement("tr");
    tr.classList.add("clickable-row");

    tr.dataset.evalTypeId = e.evalTypeId;
    tr.dataset.empno = e.evaluateeNo;
    tr.dataset.evaluatorNo = e.evaluatorNo;

    tr.innerHTML = `
        <td>${e.evalPeriod}</td>
        <td>${e.deptName}</td>
        <td>${e.evaluatorLevelName || '-'}</td>
        <td>${e.evaluatorNo}</td>
        <td>${e.evaluatorName}</td>
        <td>${e.levelName || '-'}</td>
        <td>${e.evaluateeNo}</td>
        <td>${e.evaluateeName}</td>
        <td><span class="status-badge"></span></td>
    `;

    const badge = tr.querySelector(".status-badge");
    badge.textContent = e.statusName;
    badge.classList.add(
        e.statusName === "평가완료" ? "success" : "badge"
    );

    tr.addEventListener("click", function () {
        loadEvalDetail(this);
    });

    return tr;
}
function renderProgressPaging(data) {
    const paging = document.getElementById("progressPaging");
    const info = document.getElementById("progressPagingInfo");

    const page = data.page;
    const total = data.totalPages;

    paging.innerHTML = `
        <button onclick="loadProgress(0)" ${page <= 0 ? "disabled" : ""}>
            <i class="fas fa-step-backward"></i>
        </button>

        <button onclick="loadProgress(${page - 1})" ${page <= 0 ? "disabled" : ""}>
            <i class="fas fa-caret-left"></i>
        </button>

        <button class="active">${page + 1}</button>

        <button onclick="loadProgress(${page + 1})" ${page + 1 >= total ? "disabled" : ""}>
            <i class="fas fa-caret-right"></i>
        </button>

        <button onclick="loadProgress(${total - 1})" ${page + 1 >= total ? "disabled" : ""}>
            <i class="fas fa-step-forward"></i>
        </button>
    `;

    info.innerText = `${page + 1} / ${total}`;
}
function renderCompletedPaging(data) {
    const paging = document.getElementById("completedPaging");
    const info = document.getElementById("completedPagingInfo");

    const page = data.page;
    const total = data.totalPages;

    paging.innerHTML = `
        <button onclick="loadCompleted(0)" ${page <= 0 ? "disabled" : ""}>
            <i class="fas fa-step-backward"></i>
        </button>

        <button onclick="loadCompleted(${page - 1})" ${page <= 0 ? "disabled" : ""}>
            <i class="fas fa-caret-left"></i>
        </button>

        <button class="active">${page + 1}</button>

        <button onclick="loadCompleted(${page + 1})" ${page + 1 >= total ? "disabled" : ""}>
            <i class="fas fa-caret-right"></i>
        </button>

        <button onclick="loadCompleted(${total - 1})" ${page + 1 >= total ? "disabled" : ""}>
            <i class="fas fa-step-forward"></i>
        </button>
    `;

    info.innerText = `${page + 1} / ${total}`;
}

document.getElementById("tab-progress").onclick = () => {
    document.getElementById("tab-progress").classList.add("active");
    document.getElementById("tab-completed").classList.remove("active");

    document.getElementById("progressWrap").style.display = "block";
    document.getElementById("completedWrap").style.display = "none";

    loadProgress(0);
};

document.getElementById("tab-completed").onclick = () => {
    document.getElementById("tab-completed").classList.add("active");
    document.getElementById("tab-progress").classList.remove("active");

    document.getElementById("progressWrap").style.display = "none";
    document.getElementById("completedWrap").style.display = "block";

    loadCompleted(0);
};
</script>
