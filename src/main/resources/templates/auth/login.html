<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 평가 관리 시스템</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        .login-wrapper { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .login-box { width: 440px; padding: 50px; text-align: center; }
        .login-logo { color: #0056b3; font-size: 32px; font-weight: 800; margin-bottom: 40px; }
    </style>
</head>
<body class="login-wrapper">

    <div class="card-ui login-box">
        <h1 class="login-logo">평가 관리 시스템</h1>
        
        <form th:action="@{/login}" method="post">
            <div style="text-align: left; margin-bottom: 15px;">
                <input type="text" name="empNo" class="form-control" placeholder="사번을 입력하세요" required autofocus>
            </div>
            <div style="text-align: left; margin-bottom: 30px;">
                <input type="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 16px;">로그인</button>
        </form>

        <div style="margin-top: 30px; font-size: 13px; color: #888; border-top: 1px solid #eee; padding-top: 20px;">
            <a href="#" style="color: #888; text-decoration: none;">비밀번호 초기화 안내</a> | <span>시스템 관리자 문의</span>
        </div>
    </div>

</body>
</html>
